name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Create external volumes
        run: |
          docker volume create anv-acs-volume
          docker volume create anv-postgres-volume
          docker volume create anv-ass-volume
          docker volume create anv-mongo-volume

      - name: Start Docker Compose services
        run: |
          export ACS_IMAGE=alfresco/alfresco-content-repository-community
          export ACS_VERSION=7.3.1
          export POSTGRES_IMAGE=postgres
          export POSTGRES_VERSION=13
          export ASS_IMAGE=alfresco/alfresco-search-services
          export ASS_VERSION=2.0.3
          export ACTIVEMQ_IMAGE=webcenter/activemq
          export ACTIVEMQ_VERSION=5.17.1
          export MONGO_IMAGE=mongo
          export HASHICORP_VAULT_IMAGE=vault
          export HASHICORP_VAULT_IMAGE_VERSION=1.13.3
          docker-compose -f docker-compose.test.yml up -d --build
          timeout 600 bash -c 'until curl -s --fail http://localhost:8080/alfresco/api/-default-/public/alfresco/versions/1/probes/-ready-; do echo "Waiting for Alfresco..."; sleep 5; done'
        env:
          COMPOSE_PROJECT_NAME: alfresco

      - name: Run tests
        run: mvn verify -Ptest

      - name: Print Docker Compose logs
        if: failure()
        run: docker-compose -f docker-compose.test.yml logs

      - name: Stop Docker Compose services
        if: always()
        run: docker-compose -f docker-compose.test.yml down